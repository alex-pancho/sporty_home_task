[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --capture=no
markers =
    e2e: End-to-end UI tests
    api: API layer tests
    critical: Critical business logic tests
    smoke: Smoke/sanity tests
